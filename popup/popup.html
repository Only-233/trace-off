<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>止痕 Trace Off</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- 头部：品牌 + 总开关 -->
    <header class="popup-header">
      <div class="header-left">
        <span class="header-icon">
          <img src="../icons/icon-popup.svg" width="24" height="24" alt="止痕">
        </span>
        <div class="header-title">
          <h1>止痕</h1>
          <span class="header-sub">Trace Off</span>
        </div>
      </div>
      <div class="header-right">
        <label class="toggle-switch toggle-sm" title="总开关">
          <input type="checkbox" id="masterToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </header>

    <main class="popup-main">
      <!-- 域名输入 -->
      <div class="domain-section">
        <div class="domain-input-row">
          <input type="text" class="domain-input" id="domainEditInput" placeholder="输入域名..." spellcheck="false" autocomplete="off">
          <button class="domain-reset-btn" id="domainResetBtn" title="恢复为当前页面域名">
            <img src="../icons/icon-reset.svg" width="16" height="16" alt="重置">
          </button>
        </div>
        <p class="domain-source">
          当前页面 <span id="sourceHost">—</span>
        </p>
      </div>

      <!-- 状态提示 -->
      <div class="status-row" id="statusRow">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">输入域名后即可操作</span>
        <label class="toggle-switch toggle-xs" id="domainToggleWrap" style="display:none" title="屏蔽开关">
          <input type="checkbox" id="domainToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- 操作按钮 -->
      <div class="btn-row">
        <button class="btn btn-add" id="addBtn">
          <img src="../icons/icon-add.svg" width="15" height="15" alt="添加">
          添加
        </button>
        <button class="btn btn-remove" id="removeBtn">
          <img src="../icons/icon-remove.svg" width="15" height="15" alt="移除">
          移除
        </button>
      </div>
    </main>

    <footer class="popup-footer">
      <a href="#" id="openSettings">管理设置</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
